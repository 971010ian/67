<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>函數實驗室 | 數學函數關係</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1A2332;
    --ink-soft:#26334A;
    --paper:#F5F1E8;
    --grid:#3D5A6C;
    --grid-faint: rgba(61,90,108,0.18);
    --accent:#E8C547;
    --coral:#E0796A;
    --teal:#6FA9A6;
    --text-dim:#9FB0C8;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== Header ===== */
  header{
    padding: 36px 5vw 24px;
    border-bottom: 1px solid rgba(245,241,232,0.08);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 10px;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-size: clamp(28px, 4.2vw, 46px);
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  h1 span{ color: var(--accent); }
  header p{
    margin-top: 10px;
    color: var(--text-dim);
    font-size: 15px;
    max-width: 560px;
    line-height: 1.6;
  }

  /* ===== Layout ===== */
  .lab{
    display:grid;
    grid-template-columns: 220px 1fr 300px;
    gap: 24px;
    padding: 28px 5vw 60px;
    align-items: start;
  }
  @media (max-width: 980px){
    .lab{ grid-template-columns: 1fr; }
  }

  /* ===== Function selector ===== */
  .selector{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .selector h2, .panel h2{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 12px;
  }
  .func-btn{
    text-align:left;
    background: var(--ink-soft);
    border: 1px solid transparent;
    color: var(--paper);
    padding: 14px 16px;
    border-radius: 10px;
    font-family:'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor:pointer;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .func-btn small{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-weight:400;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .func-btn:hover{ border-color: var(--teal); transform: translateX(2px); }
  .func-btn.active{
    background: var(--accent);
    color: var(--ink);
    border-color: var(--accent);
  }
  .func-btn.active small{ color: rgba(26,35,50,0.6); }

  /* ===== Center: graph ===== */
  .stage{
    background: var(--ink-soft);
    border-radius: 14px;
    padding: 20px;
    display:flex;
    flex-direction:column;
    gap: 14px;
  }
  .formula-display{
    font-family:'JetBrains Mono', monospace;
    font-size: clamp(18px, 2.6vw, 28px);
    font-weight: 700;
    color: var(--accent);
    padding: 4px 4px 10px;
    border-bottom: 1px dashed rgba(245,241,232,0.15);
    letter-spacing: 0.02em;
  }
  .formula-display .var{ color: var(--coral); }
  #graph{
    width: 100%;
    height: auto;
    display:block;
    border-radius: 8px;
  }
  .domain-readout{
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    display:flex;
    flex-wrap:wrap;
    gap: 18px;
  }
  .domain-readout b{ color: var(--paper); }

  /* ===== Right: controls ===== */
  .panel{
    background: var(--ink-soft);
    border-radius: 14px;
    padding: 20px;
    display:flex;
    flex-direction:column;
    gap: 18px;
  }
  .slider-row{ display:flex; flex-direction:column; gap:6px; }
  .slider-row label{
    display:flex;
    justify-content:space-between;
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .slider-row label .val{ color: var(--accent); font-weight:700; }
  input[type=range]{
    -webkit-appearance:none;
    width:100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(245,241,232,0.15);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:18px; height:18px;
    border-radius:50%;
    background: var(--accent);
    border: 3px solid var(--ink-soft);
    cursor:pointer;
    box-shadow: 0 0 0 1px rgba(245,241,232,0.2);
  }
  input[type=range]::-moz-range-thumb{
    width:18px; height:18px;
    border-radius:50%;
    background: var(--accent);
    border: 3px solid var(--ink-soft);
    cursor:pointer;
  }

  .note-box{
    background: rgba(111,169,166,0.1);
    border-left: 3px solid var(--teal);
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--paper);
  }
  .note-box b{ color: var(--teal); }

  /* ===== Practice ===== */
  .practice{
    margin-top: 6px;
    padding-top: 18px;
    border-top: 1px solid rgba(245,241,232,0.08);
  }
  .practice h2{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 10px;
  }
  .practice-row{
    display:flex;
    align-items:center;
    gap: 10px;
    font-family:'JetBrains Mono', monospace;
    font-size: 14px;
  }
  .practice-row input[type=number]{
    width: 80px;
    background: rgba(245,241,232,0.06);
    border: 1px solid rgba(245,241,232,0.18);
    color: var(--paper);
    border-radius: 6px;
    padding: 6px 10px;
    font-family:'JetBrains Mono', monospace;
    font-size: 14px;
  }
  .practice-row input[type=number]:focus{ outline: 1px solid var(--accent); }
  #practiceResult{
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 20px;
  }
  #practiceResult.ok{ color: var(--teal); }
  #practiceResult.err{ color: var(--coral); }

  footer{
    text-align:center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 24px 0 36px;
    font-family:'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* focus visibility */
  button:focus-visible, input:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">高中數學 · 互動單元</div>
  <h1>函數實驗室 — 拖動係數，看見<span>圖形</span>變化</h1>
  <p>每種函數都由幾個係數決定形狀與位置。拖動右側滑桿，觀察函數式、圖形與定義域 / 值域如何隨之改變。</p>
</header>

<div class="lab">

  <!-- 左：函數類型選單 -->
  <div class="selector">
    <h2>函數類型</h2>
    <button class="func-btn active" data-type="linear">
      一次函數
      <small>f(x) = ax + b</small>
    </button>
    <button class="func-btn" data-type="quadratic">
      二次函數
      <small>f(x) = ax² + bx + c</small>
    </button>
    <button class="func-btn" data-type="inverse">
      反比例函數
      <small>f(x) = a / (x − h) + k</small>
    </button>
    <button class="func-btn" data-type="absolute">
      絕對值函數
      <small>f(x) = a|x − h| + k</small>
    </button>
    <button class="func-btn" data-type="exponential">
      指數函數
      <small>f(x) = a · bˣ + k</small>
    </button>
  </div>

  <!-- 中：圖表 -->
  <div class="stage">
    <div class="formula-display" id="formulaDisplay">f(x) = <span class="var">a</span>x + <span class="var">b</span></div>
    <svg id="graph" viewBox="0 0 600 460" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="domain-readout">
      <span>定義域：<b id="domainText">所有實數 ℝ</b></span>
      <span>值域：<b id="rangeText">所有實數 ℝ</b></span>
      <span id="extraText"></span>
    </div>
  </div>

  <!-- 右：控制面板 -->
  <div class="panel">
    <h2>係數調整</h2>
    <div id="sliderArea"></div>

    <div class="note-box" id="noteBox">
      a 決定直線的<b>斜率</b>：a &gt; 0 時函數遞增，a &lt; 0 時遞減。b 是直線與 y 軸的交點（y 截距）。
    </div>

    <div class="practice">
      <h2>即時練習</h2>
      <div class="practice-row">
        <span>輸入 x =</span>
        <input type="number" id="practiceX" value="2" step="1">
        <span>→ f(x) = ?</span>
      </div>
      <div class="practice-row" style="margin-top:8px;">
        <span>你的答案：</span>
        <input type="number" id="practiceAnswer" step="0.01" placeholder="輸入數值">
        <button class="func-btn" style="padding:8px 14px; font-size:13px;" id="checkBtn">檢查</button>
      </div>
      <div id="practiceResult"></div>
    </div>
  </div>

</div>

<footer>FUNCTION LAB — 拖曳即學習</footer>

<script>
(function(){
  const W = 600, H = 460, PAD = 36;
  // 座標範圍（依函數類型可動態調整）
  let viewRange = { xmin:-10, xmax:10, ymin:-10, ymax:10 };

  const graph = document.getElementById('graph');
  const formulaDisplay = document.getElementById('formulaDisplay');
  const sliderArea = document.getElementById('sliderArea');
  const noteBox = document.getElementById('noteBox');
  const domainText = document.getElementById('domainText');
  const rangeText = document.getElementById('rangeText');
  const extraText = document.getElementById('extraText');

  // ===== 各函數類型設定 =====
  const configs = {
    linear: {
      label: 'f(x) = ax + b',
      formula: (v) => `f(x) = <span class="var">${fmt(v.a)}</span>x ${signTerm(v.b)}`,
      sliders: [
        {key:'a', label:'a (斜率)', min:-3, max:3, step:0.1, value:1},
        {key:'b', label:'b (截距)', min:-8, max:8, step:0.5, value:0},
      ],
      view: {xmin:-10,xmax:10,ymin:-10,ymax:10},
      domain: () => '所有實數 ℝ',
      range: () => '所有實數 ℝ',
      extra: (v) => `y 截距：(0, ${fmt(v.b)})`,
      note: (v) => `a 決定直線的<b>斜率</b>：${v.a>0?'目前 a > 0，函數遞增':(v.a<0?'目前 a < 0，函數遞減':'目前 a = 0，函數為水平線')}。b 是 y 截距，目前圖形與 y 軸交於 (0, ${fmt(v.b)})。`,
      fn: (x,v) => v.a*x + v.b,
    },
    quadratic: {
      label: 'f(x) = ax² + bx + c',
      formula: (v) => `f(x) = <span class="var">${fmt(v.a)}</span>x² ${signTerm(v.b)}x ${signTerm(v.c)}`,
      sliders: [
        {key:'a', label:'a (開口/寬窄)', min:-2, max:2, step:0.1, value:1},
        {key:'b', label:'b', min:-6, max:6, step:0.5, value:0},
        {key:'c', label:'c (常數項)', min:-6, max:6, step:0.5, value:0},
      ],
      view: {xmin:-10,xmax:10,ymin:-10,ymax:10},
      domain: () => '所有實數 ℝ',
      range: (v) => {
        const vert = vertex(v);
        if (v.a === 0) return '所有實數 ℝ（退化為直線）';
        return v.a > 0 ? `y ≥ ${fmt(vert.y)}` : `y ≤ ${fmt(vert.y)}`;
      },
      extra: (v) => {
        const vert = vertex(v);
        return `頂點：(${fmt(vert.x)}, ${fmt(vert.y)})`;
      },
      note: (v) => {
        if (v.a === 0) return '目前 a = 0，圖形退化為一條直線，不再是二次函數。';
        const dir = v.a > 0 ? '開口向上（有最小值）' : '開口向下（有最大值）';
        return `a 決定<b>開口方向與寬窄</b>：目前 ${dir}。頂點座標即為函數的最${v.a>0?'小':'大'}值位置。`;
      },
      fn: (x,v) => v.a*x*x + v.b*x + v.c,
    },
    inverse: {
      label: 'f(x) = a / (x − h) + k',
      formula: (v) => `f(x) = <span class="var">${fmt(v.a)}</span> / (x ${v.h>=0?'−':'+'} ${fmt(Math.abs(v.h))}) ${signTerm(v.k)}`,
      sliders: [
        {key:'a', label:'a (彎曲幅度)', min:-5, max:5, step:0.5, value:1, exclude:0},
        {key:'h', label:'h (水平平移)', min:-5, max:5, step:0.5, value:0},
        {key:'k', label:'k (垂直平移)', min:-5, max:5, step:0.5, value:0},
      ],
      view: {xmin:-10,xmax:10,ymin:-10,ymax:10},
      domain: (v) => `x ≠ ${fmt(v.h)}`,
      range: (v) => `y ≠ ${fmt(v.k)}`,
      extra: (v) => `漸近線：x = ${fmt(v.h)}，y = ${fmt(v.k)}`,
      note: (v) => `當 x 接近 ${fmt(v.h)} 時，圖形會無限靠近垂直<b>漸近線</b> x = ${fmt(v.h)}；當 |x| 很大時，圖形靠近水平漸近線 y = ${fmt(v.k)}。a 的正負決定曲線落在哪兩個象限。`,
      fn: (x,v) => v.a/(x - v.h) + v.k,
      asymptoteX: v => v.h,
    },
    absolute: {
      label: 'f(x) = a|x − h| + k',
      formula: (v) => `f(x) = <span class="var">${fmt(v.a)}</span>|x ${v.h>=0?'−':'+'} ${fmt(Math.abs(v.h))}| ${signTerm(v.k)}`,
      sliders: [
        {key:'a', label:'a (開口/寬窄)', min:-2, max:2, step:0.1, value:1},
        {key:'h', label:'h (水平平移)', min:-6, max:6, step:0.5, value:0},
        {key:'k', label:'k (垂直平移)', min:-6, max:6, step:0.5, value:0},
      ],
      view: {xmin:-10,xmax:10,ymin:-10,ymax:10},
      domain: () => '所有實數 ℝ',
      range: (v) => {
        if (v.a === 0) return `y = ${fmt(v.k)}（退化為水平線）`;
        return v.a > 0 ? `y ≥ ${fmt(v.k)}` : `y ≤ ${fmt(v.k)}`;
      },
      extra: (v) => `頂點（轉折點）：(${fmt(v.h)}, ${fmt(v.k)})`,
      note: (v) => `絕對值函數的圖形是「V 形」，頂點在 (${fmt(v.h)}, ${fmt(v.k)})。a 的正負決定 V 形開口向上或向下，|a| 越大開口越窄。`,
      fn: (x,v) => v.a*Math.abs(x - v.h) + v.k,
    },
    exponential: {
      label: 'f(x) = a · bˣ + k',
      formula: (v) => `f(x) = <span class="var">${fmt(v.a)}</span> · ${fmt(v.b)}ˣ ${signTerm(v.k)}`,
      sliders: [
        {key:'a', label:'a (垂直伸縮)', min:-3, max:3, step:0.1, value:1, exclude:0},
        {key:'b', label:'b (底數，b>0且≠1)', min:0.2, max:3, step:0.1, value:2},
        {key:'k', label:'k (垂直平移)', min:-6, max:6, step:0.5, value:0},
      ],
      view: {xmin:-10,xmax:10,ymin:-10,ymax:10},
      domain: () => '所有實數 ℝ',
      range: (v) => v.a > 0 ? `y > ${fmt(v.k)}` : `y < ${fmt(v.k)}`,
      extra: (v) => `水平漸近線：y = ${fmt(v.k)}`,
      note: (v) => {
        const trend = v.b > 1 ? '遞增（指數成長）' : (v.b < 1 ? '遞減（指數衰減）' : '為常數函數');
        return `底數 b ${v.b===1?'= 1，函數退化為常數':`${v.b>1?'> 1':'介於 0 與 1 之間'}，函數${trend}`}。函數圖形永遠不會碰到水平漸近線 y = ${fmt(v.k)}。`;
      },
      fn: (x,v) => v.a*Math.pow(v.b, x) + v.k,
    },
  };

  let currentType = 'linear';
  let values = {};

  function fmt(n){
    if (Math.abs(n) < 1e-9) return '0';
    return Number(n.toFixed(2)).toString();
  }
  function signTerm(n){
    if (n === 0) return '';
    return n > 0 ? `+ ${fmt(n)}` : `− ${fmt(Math.abs(n))}`;
  }
  function vertex(v){
    if (v.a === 0) return {x:0, y:v.c};
    const x = -v.b/(2*v.a);
    const y = v.a*x*x + v.b*x + v.c;
    return {x, y};
  }

  // ===== 座標轉換 =====
  function toSvgX(x){ return PAD + (x - viewRange.xmin)/(viewRange.xmax-viewRange.xmin) * (W-2*PAD); }
  function toSvgY(y){ return H-PAD - (y - viewRange.ymin)/(viewRange.ymax-viewRange.ymin) * (H-2*PAD); }

  // ===== 繪製座標格 =====
  function drawGrid(){
    let svg = '';
    const step = 1;
    for(let x = Math.ceil(viewRange.xmin); x <= viewRange.xmax; x += step){
      const sx = toSvgX(x);
      const major = x === 0;
      svg += `<line x1="${sx}" y1="${PAD}" x2="${sx}" y2="${H-PAD}" stroke="${major?'var(--grid)':'var(--grid-faint)'}" stroke-width="${major?1.4:1}" />`;
      if (x % 2 === 0 && !major){
        svg += `<text x="${sx}" y="${toSvgY(0)+16}" font-size="10" fill="var(--text-dim)" text-anchor="middle" font-family="JetBrains Mono, monospace">${x}</text>`;
      }
    }
    for(let y = Math.ceil(viewRange.ymin); y <= viewRange.ymax; y += step){
      const sy = toSvgY(y);
      const major = y === 0;
      svg += `<line x1="${PAD}" y1="${sy}" x2="${W-PAD}" y2="${sy}" stroke="${major?'var(--grid)':'var(--grid-faint)'}" stroke-width="${major?1.4:1}" />`;
      if (y % 2 === 0 && !major){
        svg += `<text x="${toSvgX(0)-10}" y="${sy+3}" font-size="10" fill="var(--text-dim)" text-anchor="end" font-family="JetBrains Mono, monospace">${y}</text>`;
      }
    }
    // axis labels
    svg += `<text x="${W-PAD+14}" y="${toSvgY(0)+4}" font-size="13" fill="var(--paper)" font-family="Space Grotesk, sans-serif">x</text>`;
    svg += `<text x="${toSvgX(0)-6}" y="${PAD-10}" font-size="13" fill="var(--paper)" font-family="Space Grotesk, sans-serif">y</text>`;
    return svg;
  }

  // ===== 繪製函數曲線 =====
  function drawCurve(cfg, v){
    const asymX = cfg.asymptoteX ? cfg.asymptoteX(v) : null;
    let segments = [];
    let current = [];
    const N = 600;
    for(let i=0;i<=N;i++){
      const x = viewRange.xmin + (viewRange.xmax-viewRange.xmin)*i/N;
      if (asymX !== null && Math.abs(x-asymX) < 0.03){
        if (current.length>1) segments.push(current);
        current = [];
        continue;
      }
      const y = cfg.fn(x, v);
      if (y < viewRange.ymin - 5 || y > viewRange.ymax + 5){
        if (current.length>1) segments.push(current);
        current = [];
        continue;
      }
      current.push([toSvgX(x), toSvgY(y)]);
    }
    if (current.length>1) segments.push(current);

    let svg = '';
    segments.forEach(seg => {
      const d = seg.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(2)+','+p[1].toFixed(2)).join(' ');
      svg += `<path d="${d}" fill="none" stroke="var(--coral)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
    });

    // asymptotes for inverse
    if (cfg.asymptoteX){
      const ax = cfg.asymptoteX(v);
      if (ax >= viewRange.xmin && ax <= viewRange.xmax){
        const sx = toSvgX(ax);
        svg += `<line x1="${sx}" y1="${PAD}" x2="${sx}" y2="${H-PAD}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.6"/>`;
      }
      if (v.k >= viewRange.ymin && v.k <= viewRange.ymax){
        const sy = toSvgY(v.k);
        svg += `<line x1="${PAD}" y1="${sy}" x2="${W-PAD}" y2="${sy}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.6"/>`;
      }
    }
    if (currentType === 'exponential'){
      if (v.k >= viewRange.ymin && v.k <= viewRange.ymax){
        const sy = toSvgY(v.k);
        svg += `<line x1="${PAD}" y1="${sy}" x2="${W-PAD}" y2="${sy}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.6"/>`;
      }
    }

    // vertex marker for quadratic / absolute
    if (currentType === 'quadratic'){
      const vert = vertex(v);
      if (vert.x>=viewRange.xmin && vert.x<=viewRange.xmax && vert.y>=viewRange.ymin && vert.y<=viewRange.ymax){
        svg += `<circle cx="${toSvgX(vert.x)}" cy="${toSvgY(vert.y)}" r="5" fill="var(--accent)" stroke="var(--ink)" stroke-width="1.5"/>`;
      }
    }
    if (currentType === 'absolute'){
      if (v.h>=viewRange.xmin && v.h<=viewRange.xmax && v.k>=viewRange.ymin && v.k<=viewRange.ymax){
        svg += `<circle cx="${toSvgX(v.h)}" cy="${toSvgY(v.k)}" r="5" fill="var(--accent)" stroke="var(--ink)" stroke-width="1.5"/>`;
      }
    }

    return svg;
  }

  function render(){
    const cfg = configs[currentType];
    graph.setAttribute('viewBox', `0 0 ${W} ${H}`);
    graph.style.background = 'rgba(245,241,232,0.02)';
    let svg = drawGrid();
    svg += drawCurve(cfg, values);
    graph.innerHTML = svg;

    formulaDisplay.innerHTML = cfg.formula(values);
    domainText.textContent = cfg.domain(values);
    rangeText.textContent = cfg.range(values);
    extraText.innerHTML = cfg.extra ? cfg.extra(values) : '';
    noteBox.innerHTML = cfg.note(values);

    updatePractice();
  }

  // ===== 滑桿建立 =====
  function buildSliders(){
    const cfg = configs[currentType];
    values = {};
    cfg.sliders.forEach(s => values[s.key] = s.value);

    sliderArea.innerHTML = '';
    cfg.sliders.forEach(s => {
      const row = document.createElement('div');
      row.className = 'slider-row';
      row.innerHTML = `
        <label>${s.label} <span class="val" id="val-${s.key}">${fmt(s.value)}</span></label>
        <input type="range" id="slider-${s.key}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.value}">
      `;
      sliderArea.appendChild(row);
      const input = row.querySelector('input');
      input.addEventListener('input', (e) => {
        let val = parseFloat(e.target.value);
        if (s.exclude !== undefined && Math.abs(val - s.exclude) < 1e-9){
          val += s.step; // 跳過排除值（如 a=0 或 b=1）
          e.target.value = val;
        }
        values[s.key] = val;
        document.getElementById(`val-${s.key}`).textContent = fmt(val);
        render();
      });
    });
  }

  // ===== 即時練習 =====
  function updatePractice(){
    document.getElementById('practiceResult').textContent = '';
    document.getElementById('practiceResult').className = '';
    document.getElementById('practiceAnswer').value = '';
  }

  document.getElementById('checkBtn').addEventListener('click', () => {
    const cfg = configs[currentType];
    const x = parseFloat(document.getElementById('practiceX').value);
    const userAns = parseFloat(document.getElementById('practiceAnswer').value);
    const resultEl = document.getElementById('practiceResult');

    if (isNaN(x) || isNaN(userAns)){
      resultEl.textContent = '請輸入有效的數字。';
      resultEl.className = 'err';
      return;
    }
    if (currentType === 'inverse' && Math.abs(x - values.h) < 1e-9){
      resultEl.textContent = `x = ${fmt(x)} 不在定義域內（會使分母為 0），請換一個 x 值。`;
      resultEl.className = 'err';
      return;
    }
    const correct = cfg.fn(x, values);
    if (Math.abs(correct - userAns) < 0.05){
      resultEl.textContent = `✓ 正確！f(${fmt(x)}) = ${fmt(correct)}`;
      resultEl.className = 'ok';
    } else {
      resultEl.textContent = `✗ 再試一次。提示：f(${fmt(x)}) = ${fmt(correct)}（正確答案）`;
      resultEl.className = 'err';
    }
  });

  // ===== 切換函數類型 =====
  document.querySelectorAll('.func-btn[data-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.func-btn[data-type]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentType = btn.dataset.type;
      viewRange = {...configs[currentType].view};
      buildSliders();
      render();
    });
  });

  // 初始化
  buildSliders();
  render();
})();
</script>

</body>
</html>
